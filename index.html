<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bishal Shrestha — Full-Stack Developer</title>
    <meta name="description" content="Portfolio of Bishal Shrestha, Full-Stack Developer." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Tailwind (CDN, no build step needed) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#FFFFFF',
                        'bg-soft': '#F7F7F8',
                        'bg-soft2': '#ECECF1',
                        ink: '#0D0D0D',
                        'ink-soft': '#6E6E80',
                        line: '#E5E5E5',
                        accent: '#10A37F',
                        'accent-dark': '#0D8A6C',
                        'accent-soft': '#E6F4EF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    boxShadow: {
                        card: '0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04)',
                        cardHover: '0 4px 8px rgba(0,0,0,0.06), 0 12px 28px rgba(0,0,0,0.08)',
                    },
                },
            },
        }
    </script>

    <link rel="stylesheet" href="css/style.css" />

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bishal Shrestha — Full-Stack Developer</title>
    <meta name="description" content="Portfolio of Bishal Shrestha, Full-Stack Developer." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Tailwind (CDN, no build step needed) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#FFFFFF',
                        'bg-soft': '#F7F7F8',
                        'bg-soft2': '#ECECF1',
                        ink: '#0D0D0D',
                        'ink-soft': '#6E6E80',
                        line: '#E5E5E5',
                        accent: '#10A37F',
                        'accent-dark': '#0D8A6C',
                        'accent-soft': '#E6F4EF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    boxShadow: {
                        card: '0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04)',
                        cardHover: '0 4px 8px rgba(0,0,0,0.06), 0 12px 28px rgba(0,0,0,0.08)',
                    },
                },
            },
        }
    </script>

    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-bg text-ink font-sans antialiased">
    
    <!-- Navbar-->
    <header id="navbar" class="fixed top-0 inset-x-0 z-50 border-b border-line bg-bg/80 backdrop-blur-md transition-shadow">
    
        <nav class="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">
            <a href="#home" class="flex items-center gap-2 font-semibold tracking-tight">
                <span id="navLoader" class="nav-loader" aria-hidden="true">
                    <span></span><span></span><span></span>
                </span>
                <span id="navName" class="font-mono"></span>
            </a>
    
            <ul class="hidden md:flex items-center gap-8 text-sm text-ink-soft nav-links">
                <li><a href="#about" class="nav-link hover:text-ink transition-colors">About</a></li>
                <li><a href="#skills" class="nav-link hover:text-ink transition-colors">Skills</a></li>
                <li><a href="#projects" class="nav-link hover:text-ink transition-colors">Projects</a></li>
                <li><a href="#contact" class="nav-link hover:text-ink transition-colors">Contact</a></li>
            </ul>
    
            <a href="#contact"
                class="hidden md:inline-flex items-center rounded-full bg-ink text-white text-sm font-medium px-4 py-2 hover:bg-accent transition-colors">
                Let's talk
            </a>
    
            <button id="menuBtn" aria-label="Toggle menu" aria-expanded="false"
                class="md:hidden p-2 -mr-2 rounded-lg hover:bg-bg-soft">
                <svg id="menuIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </nav>
        <!-- Scroll progress bar: fills left-to-right as the page scrolls -->
    
        <div class="h-[3px] w-full bg-transparent">
            <div id="scrollProgress" class="h-full bg-accent" style="width:0%"></div>
        </div>
    
        <!-- Mobile menu -->
        <div id="mobileMenu" class="hidden md:hidden border-t border-line bg-bg px-6 py-4">
            <ul class="flex flex-col gap-4 text-ink-soft">
                <li><a href="#about" class="mobile-link">About</a></li>
                <li><a href="#skills" class="mobile-link">Skills</a></li>
                <li><a href="#projects" class="mobile-link">Projects</a></li>
                <li><a href="#contact" class="mobile-link">Contact</a></li>
            </ul>
        </div>
    </header>



    <script src="js/main.js"></script>
</body>


</html>
